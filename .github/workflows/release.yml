name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 24 ships with npm 11.x, which supports Trusted Publishers / OIDC.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C packages/react typecheck

      - run: pnpm -C packages/react test

      - run: pnpm -C packages/react build

      # Log the claims GitHub will send to npm (useful when debugging TP mismatches).
      - name: Print OIDC claims
        if: runner.debug == '1'
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      # Uses OIDC (Trusted Publisher on npmjs.com). No NPM_TOKEN required.
      # `--provenance` is applied automatically when publishing via OIDC.
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/react

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
